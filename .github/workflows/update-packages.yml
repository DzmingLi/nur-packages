# GitHub Actions workflow to automatically update packages.
name: Update Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  update-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update flake inputs
        run: |
          nix flake update
          if ! git diff --quiet flake.lock; then
            git add flake.lock
            git commit -m "flake: update inputs"
          fi

      - name: Update packages via nix-update
        run: |
          nix-shell -p nix-update --run '
            nix-update --flake baidupcs-go --commit
            nix-update --flake quarkpantool --commit
            nix-update --flake blueprint-mcp --commit
            nix-update --flake zju-connect --version=branch --commit
          '

      - name: Update special packages via nu scripts
        run: |
          nix profile install nixpkgs#nushell
          nu scripts/update-moonbit.nu
          nu scripts/update-wechat.nu
          nu scripts/update-context7-mcp.nu

          if ! git diff --quiet; then
            git add pkgs/moonbit/default.nix \
              pkgs/wechat/default.nix \
              pkgs/context7-mcp/default.nix \
              pkgs/context7-mcp/package-lock.json
            git commit -m "packages: update moonbit/wechat/context7-mcp"
          fi

      - name: Push changes
        run: |
          if [ "$(git rev-list HEAD ^origin/main --count 2>/dev/null || echo 0)" -gt 0 ]; then
            git push
          else
            echo "Nothing to push."
          fi
