# GitHub Actions workflow to automatically update packages.
name: Update Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  update-packages:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install nushell + nix-update
        # Bootstrapping step — bash because nu is what we're installing.
        shell: bash
        run: |
          nix profile install nixpkgs#nushell nixpkgs#nix-update
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update flake inputs
        run: |
          nix flake update
          if not (git status --porcelain flake.lock | str trim | is-empty) {
            git add flake.lock
            git commit -m "flake: update inputs"
          }

      - name: Update packages via nix-update
        run: |
          nix-update --flake baidupcs-go --commit
          nix-update --flake quarkpantool --commit
          nix-update --flake blueprint-mcp --commit
          nix-update --flake zju-connect --version=branch --commit

      - name: Update special packages via nu scripts
        run: |
          nu scripts/update-moonbit.nu
          nu scripts/update-wechat.nu

          if not (git status --porcelain | str trim | is-empty) {
            git add pkgs/moonbit/default.nix pkgs/wechat/linux.nix
            git commit -m "packages: update moonbit/wechat"
          }

      - name: Push changes
        run: |
          let ahead = (git rev-list HEAD ^origin/main --count | str trim | into int)
          if $ahead > 0 {
            git push
          } else {
            print "Nothing to push."
          }
